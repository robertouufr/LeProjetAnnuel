<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mon Pti Budget</title>

</head>
<body>

<section class="page_connexion">

  <div class="header">
    <div class="logo">
      <img src="./image/portefeuille%20(1).png" alt="logo">
    </div>
    <h1>Mon Pti Budget</h1>
    <p> Réinitialiser votre mot de passe</p>
  </div>

  <div class="formulaire-connexion">
    <a href="login.html" class="retour"> ← retour à la connexion</a>
    <h2>Mot de passe oublié ?</h2>
    <p> Entrer votre email et nous vous enverrons un lien pour réinitialiser votre mot de passe </p>

    <form action="" method="post">

      <div class="formulaire">
        <label for="Email">Email</label>
        <input type="email" id="email" name="email" placeholder=" ✉ vousexemple@gmail.com" required>
      </div>


      <button type="submit"> Envoyer le lien de réinitialisation </button>

    </form>
  </div>


</body>
