<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> Mon Pti Budget</title>
    <link rel="stylesheet" href="registreV2.css">
</head>
<body>
<div class="container">
    <div class="gauche">

    </div>

<div class="droite">
    <div class="formulaire-connexion">


        <h2>Crée un compte</h2>
        <p>Rejoignez des dizaines d'utilisateurs qui maîtrisent leur budget</p>

        <form action="" method="post">

            <div class="formulaire">
                <label for="Prenom">Nom Complet</label>
                <input type="Prenom" id="Prenom" name="Prenom" placeholder=" Ex : Enzo Druere " required>
            </div>
            <div class="formulaire">
                <label for="Email">Email</label>
                <input type="email" id="email" name="email" placeholder=" ✉ vousexemple@gmail.com" required>
            </div>


            <div class="formulaire">
                <label for="tel">Téléphone</label>
                <input type="text" id="tel" name="tel" placeholder=" Ex : 06 54 47 85 45" required>
            </div>

            <div class="mdp">
                <div class="formulaire">
                    <label for="motdepasse">Mot de passe</label>
                    <input type="password" id="motdepasse" name="motdepasse" placeholder=" ⌦ ••••••••••" required>
                </div>

                <div class="formulaire" id="confirmer">
                    <label for="confirmermotdepasse"> Confirmer </label>
                    <input type="password" id="confirmermotdepasse" name="motdepasse" placeholder=" ⌦ ••••••••••" required>
                </div>
            </div>

            <button type="submit"> Créer mon compte </button>

            <p class="inscription">
            Déja un compte ? <a href="login.html">Se connecter</a>
            </p>

        </form>
    </div>

</div>


</div>
</body>
</html>
