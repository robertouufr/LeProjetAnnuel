<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mon Pti Budget</title>
    <link rel="stylesheet" href="stylelogin.css">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
</head>


<body>

<section class="page_connexion">

  <div class="header">
    <div class="logo">
      <img src="./image/portefeuille%20(1).png" alt="logo">
    </div>
    <h1>Mon Pti Budget</h1>
    <p> Gérer vos finances simplement</p>
  </div>

  <div class="formulaire-connexion">
    <h2>Connexion</h2>

    <form action="" method="post">

      <div class="formulaire">
        <label for="Email">Email</label>
        <input type="email" id="email" name="email" placeholder=" ✉ vousexemple@gmail.com" required>
      </div>

      <div class="formulaire">
        <label for="motdepasse">Mot de passe</label>
        <input type="password" id="motdepasse" name="motdepasse" placeholder=" ⌦ ••••••••••" required>
      </div>

      <a href="oubliemdp.html" class="mot-de-passe-oublie">Mot de passe oublié ?</a>

      <button type="submit"> Se connecter </button>

      <p class="inscription">
        Pas encore de compte ? <a href="registre.html">Créer un compte</a>
      </p>

    </form>
  </div>


  </div>

</section>

</body>
</html>
